# TradeTally - Open Graph link previews for shared trade pages.
# Managed by scripts/update-native.sh (installed to /etc/nginx/snippets/ on each
# update) - do not edit the installed copy in place; change it in the repo.
#
# ONE-TIME SETUP: include this file INSIDE the tradetally server { } block:
#   include /etc/nginx/snippets/tradetally-og.conf;
#
# Social link-preview crawlers requesting an individual trade page are rewritten
# to the backend /og route, which serves per-trade OG/Twitter meta tags plus a
# server-rendered card image. Humans fall through to the SPA as normal. Only
# trades the owner made public render a per-trade card; everything else gets the
# generic site card, so nothing private leaks.

# Defense-in-depth headers for native installs. Because this snippet is included
# in the active server block, these also cover the SPA HTML shell.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-EUqK7xHJ6Mp/kgiQ6JW4yyE7/JI9MDN7nvv2MmXa/Kc=' https://s3.tradingview.com https://cdn.jsdelivr.net https://unpkg.com https://cdn.promotekit.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://api.finnhub.io https://www.alphavantage.co https://generativelanguage.googleapis.com https://promotekit.com; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

location ~ ^/trades/[0-9a-fA-F-]+$ {
    if ($http_user_agent ~* "(Twitterbot|facebookexternalhit|Facebot|LinkedInBot|Slackbot|Discordbot|TelegramBot|WhatsApp|Pinterest|redditbot|Embedly|Iframely|Mastodon|skypeuripreview|vkShare|Google-PageRenderer)") {
        rewrite ^(/trades/[0-9a-fA-F-]+)$ /og$1 last;
    }
    try_files $uri $uri/ /index.html;
}

location /og/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
}
