version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tradetally-db-dev
    environment:
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trader_password}
      POSTGRES_DB: ${DB_NAME:-tradetally}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - trader-network-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-tradetally}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application (Frontend + Backend) - Built from local Dockerfile
  app:
    image: tradetally-app:dev
    container_name: tradetally-app-dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
    ports: #port 5173 open to web for auto loading changes on web
      - "5173:5173"
      - "3000:3000"
    volumes:
      # - ./backend/src/logs:/app/backend/src/logs
      # - ./backend/src/data:/app/backend/src/data
      # - ./backend/uploads:/app/backend/uploads
      # Mount source code for development (optional - enables hot reload if supported)
      # Covers everything avoids annyoing npm hot reload bug
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    networks:
      - trader-network-dev
    restart: unless-stopped

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: tradetally-adminer-dev
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - trader-network-dev
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped

networks:
  trader-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
    driver: local
