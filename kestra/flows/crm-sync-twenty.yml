id: tradetally_twenty_sync
namespace: tradetally.crm

description: >
  Scheduled Twenty-only CRM reconciliation for TradeTally.
  Uses the backend as the source of truth for mapping and retry behavior.

triggers:
  - id: every_six_hours
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 */6 * * *"

tasks:
  - id: crm_sync_status
    type: io.kestra.plugin.core.http.Request
    uri: "{{secret('TRADETALLY_API_BASE_URL')}}/api/internal/kestra/crm-sync/status"
    method: GET
    headers:
      X-Internal-Service-Secret: "{{secret('KESTRA_INTERNAL_API_SECRET')}}"
      X-Internal-Service-Name: "kestra"

  - id: twenty_sync
    type: io.kestra.plugin.core.http.Request
    uri: "{{secret('TRADETALLY_API_BASE_URL')}}/api/internal/kestra/crm-sync/twenty"
    method: POST
    contentType: application/json
    options:
      readTimeout: PT20M
    headers:
      X-Internal-Service-Secret: "{{secret('KESTRA_INTERNAL_API_SECRET')}}"
      X-Internal-Service-Name: "kestra"
    body: |
      {
        "reason": "kestra_scheduled_twenty_sync"
      }
