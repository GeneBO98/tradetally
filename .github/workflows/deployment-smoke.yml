name: Deployment Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Deployment base URL
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Create run, export PDF, share, and verify scoped access
        working-directory: backend
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
          SMOKE_TOKEN: ${{ secrets.DEPLOYMENT_SMOKE_TOKEN }}
        run: npm run deployment:smoke

      - name: Verify static asset MIME types
        working-directory: backend
        env:
          STATIC_SMOKE_BASE_URL: ${{ inputs.base_url }}
        run: npm run smoke:static-assets

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-smoke-artifacts
          if-no-files-found: ignore
          path: test-results/deployment-smoke/**
