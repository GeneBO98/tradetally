name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Verify package versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BACKEND_VERSION="$(node -p "require('./backend/package.json').version")"
          FRONTEND_VERSION="$(node -p "require('./frontend/package.json').version")"

          if [ "$BACKEND_VERSION" != "$TAG_VERSION" ]; then
            echo "backend/package.json version ($BACKEND_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

          if [ "$FRONTEND_VERSION" != "$TAG_VERSION" ]; then
            echo "frontend/package.json version ($FRONTEND_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
