name: Restore Drill

on:
  schedule:
    - cron: '17 8 * * 1'
  workflow_dispatch:

jobs:
  restore-drill:
    runs-on: ubuntu-latest
    env:
      RESTORE_DRILL_S3_BUCKET_PREFIX: ${{ secrets.RESTORE_DRILL_S3_BUCKET_PREFIX }}
      RESTORE_DRILL_GCS_BUCKET_PREFIX: ${{ secrets.RESTORE_DRILL_GCS_BUCKET_PREFIX }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      GCP_LOCATION: ${{ secrets.GCP_LOCATION }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tradetally_restore_drill
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tradetally_restore_drill"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations on source database
        working-directory: backend
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: tradetally_restore_drill
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: npm run migrate

      - name: Validate backup restore drill
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: tradetally_restore_drill
          DB_USER: postgres
          DB_PASSWORD: postgres
          RESTORE_DRILL_OFFSITE_URI: ${{ secrets.RESTORE_DRILL_OFFSITE_URI }}
          RESTORE_DRILL_SIGNED_UPLOAD_URL: ${{ secrets.RESTORE_DRILL_SIGNED_UPLOAD_URL }}
          RESTORE_DRILL_SIGNED_DOWNLOAD_URL: ${{ secrets.RESTORE_DRILL_SIGNED_DOWNLOAD_URL }}
          RESTORE_DRILL_ENCRYPTION_KEY: ${{ secrets.RESTORE_DRILL_ENCRYPTION_KEY }}
        run: ./scripts/restore-drill.sh

      - name: Upload restore drill backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-drill-backup
          if-no-files-found: ignore
          path: backups/restore-drill/**

      - name: Configure AWS credentials for ephemeral S3 restore drill
        if: env.RESTORE_DRILL_S3_BUCKET_PREFIX != ''
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION || 'us-east-1' }}

      - name: Run restore drill against ephemeral S3 bucket
        if: env.RESTORE_DRILL_S3_BUCKET_PREFIX != ''
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: tradetally_restore_drill
          DB_USER: postgres
          DB_PASSWORD: postgres
          RESTORE_DRILL_ENCRYPTION_KEY: ${{ secrets.RESTORE_DRILL_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          BUCKET="${RESTORE_DRILL_S3_BUCKET_PREFIX}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          aws s3 mb "s3://${BUCKET}" --region "${AWS_REGION:-us-east-1}"
          trap 'aws s3 rb "s3://${BUCKET}" --force || true' EXIT
          RESTORE_DRILL_OFFSITE_URI="s3://${BUCKET}/restore-drill" ./scripts/restore-drill.sh

      - name: Authenticate Google Cloud for ephemeral GCS restore drill
        if: env.RESTORE_DRILL_GCS_BUCKET_PREFIX != ''
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        if: env.RESTORE_DRILL_GCS_BUCKET_PREFIX != ''
        uses: google-github-actions/setup-gcloud@v3

      - name: Run restore drill against ephemeral GCS bucket
        if: env.RESTORE_DRILL_GCS_BUCKET_PREFIX != ''
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: tradetally_restore_drill
          DB_USER: postgres
          DB_PASSWORD: postgres
          RESTORE_DRILL_ENCRYPTION_KEY: ${{ secrets.RESTORE_DRILL_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          BUCKET="${RESTORE_DRILL_GCS_BUCKET_PREFIX}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          gcloud storage buckets create "gs://${BUCKET}" --location="${GCP_LOCATION:-US}"
          trap 'gcloud storage rm -r "gs://${BUCKET}" --quiet || true' EXIT
          RESTORE_DRILL_OFFSITE_URI="gs://${BUCKET}/restore-drill" ./scripts/restore-drill.sh
