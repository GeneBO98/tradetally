<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{headline}}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#f4f4f5;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="520" style="width:100%;max-width:520px;border-collapse:collapse;">
          <tr>
            <td style="padding:0 0 32px 0;text-align:center;">
              <span style="font-size:22px;font-weight:700;color:#F0812A;letter-spacing:-0.5px;">TradeTally</span>
            </td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;border:1px solid #e4e4e7;padding:40px 36px;">
              <h1 style="color:#18181b;font-size:22px;margin:0 0 8px 0;font-weight:700;">{{headline}}</h1>
              <p style="color:#71717a;font-size:15px;line-height:1.6;margin:0 0 20px 0;">{{greeting}}</p>
              <p style="color:#52525b;font-size:15px;line-height:1.6;margin:0 0 24px 0;">{{body_text}}</p>
              <ul style="color:#52525b;font-size:15px;line-height:1.6;margin:0 0 28px 20px;padding:0;">
                <li style="margin:0 0 10px 0;">{{feature_1}}</li>
                <li style="margin:0 0 10px 0;">{{feature_2}}</li>
                <li style="margin:0 0 10px 0;">{{feature_3}}</li>
              </ul>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="margin:0 auto 8px auto;border-collapse:separate;">
                <tr>
                  <td align="center" bgcolor="#F0812A" style="background-color:#F0812A;border-radius:8px;">
                    <a href="{{dashboard_url}}" style="background-color:#F0812A;color:#ffffff;padding:12px 28px;text-decoration:none;display:inline-block;font-weight:600;font-size:14px;line-height:14px;border-radius:8px;">{{cta_text}}</a>
                  </td>
                </tr>
              </table>
              <p style="color:#a1a1aa;font-size:13px;line-height:1.5;margin:0 0 24px 0;text-align:center;word-break:break-all;">{{dashboard_url}}</p>
              <p style="color:#a1a1aa;font-size:11px;margin:24px 0 0 0;padding-top:20px;border-top:1px solid #f4f4f5;text-align:center;">You're receiving this because you opted into marketing emails. <a href="{{unsubscribe_url}}" style="color:#71717a;text-decoration:underline;">Unsubscribe</a></p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
