<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset your password</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color:#f4f4f5;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="520" style="width:100%;max-width:520px;border-collapse:collapse;">
          <tr>
            <td style="padding:0 0 32px 0;text-align:center;">
              <span style="font-size:22px;font-weight:700;color:#F0812A;letter-spacing:-0.5px;">TradeTally</span>
            </td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;border:1px solid #e4e4e7;padding:40px 36px;">
              <h1 style="color:#18181b;font-size:22px;margin:0 0 8px 0;font-weight:700;">Reset your password</h1>
              <p style="color:#71717a;font-size:15px;line-height:1.6;margin:0 0 28px 0;">We received a request to reset the password for your TradeTally account.</p>
              <div style="text-align:center;margin:0 0 28px 0;">
                <a href="{{reset_url}}" style="background-color:#F0812A;color:#ffffff;padding:12px 28px;text-decoration:none;display:inline-block;font-weight:600;font-size:14px;line-height:14px;border-radius:8px;">Reset Password</a>
              </div>
              <p style="color:#a1a1aa;font-size:13px;line-height:1.5;margin:0 0 4px 0;">This link expires in 1 hour. If you didn't request this, you can safely ignore this email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
