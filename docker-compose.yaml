version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tradetally-db
    environment:
      POSTGRES_USER: ${DB_USER:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-tradetally}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trader-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-trader} -d ${DB_NAME:-tradetally}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application (Frontend + Backend)
  # Build locally to ensure latest features including chart fixes
  app:
    image: potentialmidas/tradetally:latest
    container_name: tradetally-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Backend environment variables
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-trader}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      DB_NAME: ${DB_NAME:-tradetally}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-}
      DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-}
      DB_STATEMENT_TIMEOUT: ${DB_STATEMENT_TIMEOUT:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      # OAuth2/OIDC signing keys
      OAUTH_PRIVATE_KEY: ${OAUTH_PRIVATE_KEY:-}
      OAUTH_PRIVATE_KEY_PATH: ${OAUTH_PRIVATE_KEY_PATH:-}
      OAUTH_PUBLIC_KEY: ${OAUTH_PUBLIC_KEY:-}
      OAUTH_PUBLIC_KEY_PATH: ${OAUTH_PUBLIC_KEY_PATH:-}
      # Email configuration (optional)
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@tradetally.io}
      EMAIL_DOMAIN: ${EMAIL_DOMAIN:-}
      DKIM_PRIVATE_KEY: ${DKIM_PRIVATE_KEY:-}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-}
      # Frontend API URL
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
      # Instance Configuration
      INSTANCE_NAME: ${INSTANCE_NAME:-TradeTally}
      INSTANCE_URL: ${INSTANCE_URL:-}
      APP_URL: ${APP_URL:-}
      BASE_URL: ${BASE_URL:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      # CORS Configuration for Mobile Apps
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Mobile Support Configuration
      ACCESS_TOKEN_EXPIRE: ${ACCESS_TOKEN_EXPIRE:-15m}
      REFRESH_TOKEN_EXPIRE: ${REFRESH_TOKEN_EXPIRE:-30d}
      MAX_DEVICES_PER_USER: ${MAX_DEVICES_PER_USER:-10}
      ENABLE_DEVICE_TRACKING: ${ENABLE_DEVICE_TRACKING:-true}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-52428800}
      # OAuth2 token settings
      OAUTH2_ACCESS_TOKEN_EXPIRE: ${OAUTH2_ACCESS_TOKEN_EXPIRE:-}
      OAUTH2_REFRESH_TOKEN_EXPIRE: ${OAUTH2_REFRESH_TOKEN_EXPIRE:-}
      # Analytics Configuration (Optional - Plausible, Umami, etc.)
      VITE_ANALYTICS_DOMAIN: ${VITE_ANALYTICS_DOMAIN:-}
      VITE_ANALYTICS_SITE_ID: ${VITE_ANALYTICS_SITE_ID:-}
      VITE_POSTHOG_ENABLED: ${VITE_POSTHOG_ENABLED:-false}
      VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
      VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://us.i.posthog.com}
      POSTHOG_KEY: ${POSTHOG_KEY:-}
      POSTHOG_HOST: ${POSTHOG_HOST:-}
      POSTHOG_LOG_LEVEL: ${POSTHOG_LOG_LEVEL:-}
      # Registration Control
      REGISTRATION_MODE: ${REGISTRATION_MODE:-open}
      # API Documentation
      ENABLE_SWAGGER: ${ENABLE_SWAGGER:-true}
      # External API Keys
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      # Finnhub rate limits (Free: 60/min, 1/sec | Basic: 150/min, 30/sec | Pro: 300/min, 60/sec)
      FINNHUB_RATE_LIMIT_PER_MINUTE: ${FINNHUB_RATE_LIMIT_PER_MINUTE:-60}
      FINNHUB_RATE_LIMIT_PER_SECOND: ${FINNHUB_RATE_LIMIT_PER_SECOND:-1}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      OPENFIGI_API_KEY: ${OPENFIGI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-}
      DATABENTO_API_KEY: ${DATABENTO_API_KEY:-}
      COINGECKO_API_KEY: ${COINGECKO_API_KEY:-}
      ENABLE_AI_CUSIP_RESOLUTION: ${ENABLE_AI_CUSIP_RESOLUTION:-false}
      # Billing and subscriptions
      BILLING_ENABLED: ${BILLING_ENABLED:-false}
      FEATURES_BILLING_ENABLED: ${FEATURES_BILLING_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APPLE_SHARED_SECRET: ${APPLE_SHARED_SECRET:-}
      APPLE_APP_ID: ${APPLE_APP_ID:-}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-}
      APPLE_IAP_ROOT_CA_PATH: ${APPLE_IAP_ROOT_CA_PATH:-}
      APPLE_IAP_ROOT_CA_PEM: ${APPLE_IAP_ROOT_CA_PEM:-}
      # Schwab OAuth Configuration
      SCHWAB_CLIENT_ID: ${SCHWAB_CLIENT_ID:-}
      SCHWAB_CLIENT_SECRET: ${SCHWAB_CLIENT_SECRET:-}
      SCHWAB_REDIRECT_URI: ${SCHWAB_REDIRECT_URI:-}
      # Broker token encryption key (generate with: openssl rand -hex 32)
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY:-}
      # Push notifications
      ENABLE_PUSH_NOTIFICATIONS: ${ENABLE_PUSH_NOTIFICATIONS:-false}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_PATH: ${APNS_KEY_PATH:-}
      # Database Configuration
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      SKIP_BASE_SCHEMA: ${SKIP_BASE_SCHEMA:-false}
      # Feature Toggles - Background Services
      # Set to 'false' to disable and reduce resource usage
      ENABLE_PRICE_MONITORING: ${ENABLE_PRICE_MONITORING:-true}
      ENABLE_TRADE_ENRICHMENT: ${ENABLE_TRADE_ENRICHMENT:-true}
      ENABLE_JOB_RECOVERY: ${ENABLE_JOB_RECOVERY:-true}
      ENABLE_GAMIFICATION: ${ENABLE_GAMIFICATION:-true}
      ENABLE_TRIAL_EMAILS: ${ENABLE_TRIAL_EMAILS:-true}
      ENABLE_RETENTION_EMAILS: ${ENABLE_RETENTION_EMAILS:-true}
      ENABLE_OPTIONS_SCHEDULER: ${ENABLE_OPTIONS_SCHEDULER:-true}
      ENABLE_BACKUP_SCHEDULER: ${ENABLE_BACKUP_SCHEDULER:-true}
      ENABLE_BROKER_SYNC_SCHEDULER: ${ENABLE_BROKER_SYNC_SCHEDULER:-true}
      ENABLE_CATEGORY_SCHEDULER: ${ENABLE_CATEGORY_SCHEDULER:-true}
      ENABLE_DIVIDEND_SCHEDULER: ${ENABLE_DIVIDEND_SCHEDULER:-true}
      ENABLE_EARNINGS_SCHEDULER: ${ENABLE_EARNINGS_SCHEDULER:-true}
      ENABLE_NEWS_SCHEDULER: ${ENABLE_NEWS_SCHEDULER:-true}
      ENABLE_STOCK_SCANNER: ${ENABLE_STOCK_SCANNER:-true}
      ENABLE_ENRICHMENT_CACHE_CLEANUP: ${ENABLE_ENRICHMENT_CACHE_CLEANUP:-true}
      ENABLE_ACTIVITY_TRACKING: ${ENABLE_ACTIVITY_TRACKING:-true}
      ENABLE_ENGAGEMENT_TRACKING: ${ENABLE_ENGAGEMENT_TRACKING:-true}
      ENABLE_V1_WEBHOOKS: ${ENABLE_V1_WEBHOOKS:-false}
      FEATURES_BEHAVIORAL_ANALYTICS_ENABLED: ${FEATURES_BEHAVIORAL_ANALYTICS_ENABLED:-true}
      # Background service tuning
      ENGAGEMENT_CRON: ${ENGAGEMENT_CRON:-}
      PRICE_MONITOR_MAX_SYMBOLS: ${PRICE_MONITOR_MAX_SYMBOLS:-}
      BACKUP_DIR: ${BACKUP_DIR:-}
      # Webhooks and idempotency
      WEBHOOK_FAILURE_THRESHOLD: ${WEBHOOK_FAILURE_THRESHOLD:-}
      WEBHOOK_TIMEOUT_MS: ${WEBHOOK_TIMEOUT_MS:-}
      IDEMPOTENCY_TTL_HOURS: ${IDEMPOTENCY_TTL_HOURS:-}
      # WebAuthn/passkeys
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG_IMPORT: ${DEBUG_IMPORT:-false}
      # Timezone Configuration (affects admin metrics "today" calculations)
      TZ: ${TZ:-UTC}
      # Security settings
      TRUST_PROXY: ${TRUST_PROXY:-}
      DETAILED_AUTH_ERRORS: ${DETAILED_AUTH_ERRORS:-false}
      # Rate Limiting (set RATE_LIMIT_ENABLED=false to disable for self-hosted)
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-1000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
    ports:
      - "8080:80"
    volumes:
      - ./backend/src/logs:/app/backend/src/logs
      - ./backend/src/data:/app/backend/src/data
      - ./backend/uploads:/app/backend/uploads
    networks:
      - trader-network
    restart: unless-stopped

networks:
  trader-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
